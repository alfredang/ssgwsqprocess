<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Process Steps — SSG WSQ Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="index.html" class="navbar-brand">
      <div class="logo-icon">W</div>
      <span>WSQ Guide</span>
    </a>
    <div class="navbar-links">
      <a href="index.html">Home</a>
      <a href="steps.html" class="active">Process Steps</a>
    </div>
  </nav>

  <!-- Main Layout: Sidebar + Viewer -->
  <main class="steps-layout">

    <!-- Sidebar -->
    <aside class="steps-sidebar" aria-label="Process steps list">
      <div class="sidebar-header">
        <h2>WSQ Process Steps</h2>
        <div class="search-box">
          <span class="search-icon">&#x1F50D;</span>
          <input
            type="text"
            id="search-input"
            placeholder="Search steps..."
            aria-label="Search process steps"
            autocomplete="off"
          >
        </div>
      </div>
      <div class="steps-list" id="steps-list" role="list" aria-label="Steps"></div>
    </aside>

    <!-- Viewer Panel -->
    <section class="viewer-panel" aria-label="PDF viewer">
      <div class="viewer-toolbar">
        <div class="viewer-toolbar-left">
          <button class="btn-icon" id="btn-close" title="Close document" aria-label="Close document">&#x2715;</button>
          <div>
            <div class="viewer-toolbar-title" id="viewer-title"></div>
            <div class="viewer-toolbar-step" id="viewer-step-label"></div>
          </div>
        </div>
        <div class="viewer-toolbar-right">
          <div class="nav-buttons">
            <button class="nav-btn" id="btn-prev" disabled aria-label="Previous step">&larr; Prev</button>
            <button class="nav-btn" id="btn-next" disabled aria-label="Next step">Next &rarr;</button>
          </div>
          <button class="btn-icon" id="btn-open-tab" title="Open in new tab" aria-label="Open in new tab">&#x2197;</button>
        </div>
      </div>
      <div class="viewer-content" id="viewer-content">
        <div class="empty-state">
          <div class="empty-state-icon">&#x1F4C4;</div>
          <h3>Select a Process Step</h3>
          <p>Click any step from the sidebar to view its PDF document here.</p>
        </div>
      </div>
    </section>

  </main>

  <footer class="footer" style="grid-column:1/-1;">
    SSG WSQ Process Guide &mdash; Powered by <a href="https://www.tertiarycourses.com.sg" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;">Tertiary Infotech Academy Pte Ltd</a>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/steps.js"></script>
</body>
</html>
